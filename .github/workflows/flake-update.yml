name: flake update

on:
  schedule:
    - cron: '0 3 1-31/3 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flake-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check-changes.outputs.updated }}
      commit-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet -- flake.lock; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "No flake.lock changes; skipping build."
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push flake.lock
        id: commit
        if: steps.check-changes.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update flake.lock"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    if: needs.update.outputs.updated == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: nixos
            runs-on: ubuntu-latest
            flake-attr: nixosConfigurations
          - host: server
            runs-on: ubuntu-latest
            flake-attr: nixosConfigurations
          - host: macbook
            runs-on: macos-latest
            flake-attr: darwinConfigurations
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update.outputs.commit-sha }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore / configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'akazdayo' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set up Attic cache
        if: vars.ATTIC_CACHE != '' && secrets.ATTIC_ENDPOINT != '' && secrets.ATTIC_TOKEN != ''
        uses: ryanccn/attic-action@v0
        with:
          endpoint: ${{ secrets.ATTIC_ENDPOINT }}
          cache: ${{ vars.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: nix build ".#${{ matrix.flake-attr }}.${{ matrix.host }}.config.system.build.toplevel" --print-build-logs

      - name: Push result to Attic
        if: vars.ATTIC_CACHE != ''
        env:
          ATTIC_CACHE: ${{ vars.ATTIC_CACHE }}
        run: |
          if attic push "$ATTIC_CACHE" ./result; then
            echo "Pushed build result to Attic cache '$ATTIC_CACHE'."
          else
            echo "Warning: failed to push build result to Attic cache '$ATTIC_CACHE'; continuing because Cachix is the primary cache." >&2
          fi
